version: '3.8'

services:
  todo-app:
    build: .
    container_name: todo-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-change-in-production}
      - DATABASE_URL=file:/app/data/dev.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped